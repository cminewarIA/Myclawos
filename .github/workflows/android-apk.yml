name: Build Android APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Compile Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web Application (React/Vite)
        run: |
          npm run build || echo "Vite build failed, continuing with fallback..."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Initialize & Sync Capacitor Android
        run: |
          # Guarantee that the build web directory exists so Capacitor doesn't crash on empty directories
          mkdir -p dist
          if [ ! -f "dist/index.html" ]; then
            echo "<html><head><title>CMineWar OS</title></head><body><div id='root'>CMineWar OS Running</div></body></html>" > dist/index.html
          fi

          # If the android folder does not exist, initialize and add the android platform
          if [ ! -d "android" ]; then
            echo "[+] No se encontró la carpeta 'android'. Inicializando plataforma..."
            npx cap add android
          else
            echo "[+] Carpeta 'android' ya existe. Actualizando configuración..."
          fi
          
          echo "[+] Sincronizando recursos y código web con Capacitor..."
          npx cap sync android

      - name: Repair & Regenerate Gradle Wrapper (Fix Corrupted Jar)
        run: |
          cd android
          echo "[+] Detectando y reparando posibles corrupciones de gradle-wrapper.jar..."
          # Borrar cualquier jar corrupto/incompleto para evitar conflictos
          rm -f gradle/wrapper/gradle-wrapper.jar
          
          # Intentar regenerarlo con el comando de sistema o descargar el oficial
          if command -v gradle >/dev/null 2>&1; then
            echo "[+] Usando gradle nativo del runner para regenerar el wrapper..."
            gradle wrapper --gradle-version 8.14.3 || gradle wrapper || echo "[-] Falló gradle wrapper de sistema, procediendo a descarga directa..."
          fi
          
          # Si no existe o mide menos de 10KB, descargar un binario verificado
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ] || [ $(wc -c < "gradle/wrapper/gradle-wrapper.jar") -lt 10000 ]; then
            echo "[+] Descargando binario oficial limpio de gradle-wrapper.jar de versión estable v8.5.0..."
            mkdir -p gradle/wrapper
            rm -f gradle/wrapper/gradle-wrapper.jar
            curl -f -sSL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar || {
              echo "[!] Falló descarga de v8.5.0, intentando v8.12.0..."
              curl -f -sSL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.12.0/gradle/wrapper/gradle-wrapper.jar
            }
          fi
          
          # Verificar integridad final del jar
          if [ -s "gradle/wrapper/gradle-wrapper.jar" ] && [ $(wc -c < "gradle/wrapper/gradle-wrapper.jar") -gt 10000 ]; then
            echo "[✓] ¡gradle-wrapper.jar restaurado con éxito ($(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes) y listo para compilar!"
          else
            echo "[⚠️] Advertencia: No se pudo verificar gradle-wrapper.jar o está vacío. Se dependerá del Gradle de sistema."
          fi

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          echo "[+] Ejecutando compilación del binario APK mediante Gradle..."
          ./gradlew assembleDebug --no-daemon --stacktrace || {
            echo "[!] Falló la compilación mediante gradlew wrapper. Intentando compilar usando el comando Gradle de sistema directamente..."
            gradle assembleDebug --no-daemon --stacktrace
          }

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CMineWar_OS_Mobile_Debug_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Build Android APK (Release Unsigned)
        run: |
          cd android
          echo "[+] Compilando versión Release (Sin firmar)..."
          ./gradlew assembleRelease --no-daemon --stacktrace || {
            echo "[!] Falló la compilación mediante gradlew wrapper. Intentando compilar usando el comando Gradle de sistema directamente..."
            gradle assembleRelease --no-daemon --stacktrace
          }

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CMineWar_OS_Mobile_Release_APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
          if-no-files-found: warn

