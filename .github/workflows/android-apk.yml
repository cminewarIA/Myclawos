name: Build Multiplatform (Android & Ubuntu)

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION_WARNING: 'false'

jobs:
  increment_version:
    name: Increment Version and Push
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.git_commit.outputs.sha }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Increment Version
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          node increment-version.cjs

      - name: Commit and Push Updated Version File
        id: git_commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ "${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}" = "true" ]; then
            git add src/version.ts
            if ! git diff-index --quiet HEAD; then
              git commit -m "chore: increment version [skip ci]"
              BRANCH_NAME=${GITHUB_REF#refs/heads/}
              git push origin HEAD:$BRANCH_NAME
              NEW_SHA=$(git rev-parse HEAD)
              echo "sha=$NEW_SHA" >> $GITHUB_OUTPUT
              echo "Incremented version and pushed commit: $NEW_SHA"
            else
              echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
              echo "No version change, using original SHA: ${{ github.sha }}"
            fi
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "Skipping version increment for event: ${{ github.event_name }}"
          fi

  build_android:
    name: Compile Android APK
    needs: increment_version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.increment_version.outputs.sha }}
          lfs: true

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web Application (React/Vite)
        run: |
          npm run build || echo "Vite build failed, continuing with fallback..."

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Initialize & Sync Capacitor Android
        run: |
          # Guarantee that the build web directory exists so Capacitor doesn't crash on empty directories
          mkdir -p dist
          if [ ! -f "dist/index.html" ]; then
            echo "<html><head><title>CMineWar OS</title></head><body><div id='root'>CMineWar OS Running</div></body></html>" > dist/index.html
          fi

          # If the android folder does not exist, initialize and add the android platform
          if [ ! -d "android" ]; then
            echo "[+] No se encontró la carpeta 'android'. Inicializando plataforma..."
            npx cap add android
          else
            echo "[+] Carpeta 'android' ya existe. Actualizando configuración..."
          fi
          
          echo "[+] Sincronizando recursos y código web con Capacitor..."
          npx cap sync android

      - name: Repair & Regenerate Gradle Wrapper (Fix Corrupted Jar)
        run: |
          cd android
          echo "[+] Detectando y reparando posibles corrupciones de gradle-wrapper.jar..."
          
          # Función para validar si el jar es correcto y no está corrupto (usando unzip -t para validar estructura zip/jar)
          validate_jar() {
            if [ -f "gradle/wrapper/gradle-wrapper.jar" ] && unzip -t "gradle/wrapper/gradle-wrapper.jar" >/dev/null 2>&1; then
              return 0
            fi
            return 1
          }
          
          # Si ya existe un jar válido que pase la integridad zip, no hacemos nada
          if validate_jar; then
            echo "[✓] gradle-wrapper.jar ya existe, es válido y ha pasado la prueba de integridad zip ($(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes)."
          else
            echo "[!] gradle-wrapper.jar no es válido, está corrupto o ausente. Iniciando restauración..."
            rm -f gradle/wrapper/gradle-wrapper.jar
            mkdir -p gradle/wrapper
            
            # Método 1: Usar gradle nativo del runner si está disponible para regenerarlo localmente (la forma más limpia y compatible)
            if command -v gradle >/dev/null 2>&1; then
              echo "[+] Usando gradle nativo del sistema para regenerar el wrapper..."
              gradle wrapper --gradle-version 8.14.3 || gradle wrapper || true
            fi
            
            # Método 2: Descargar desde el repositorio oficial de Gradle en GitHub (sin Git LFS)
            if ! validate_jar; then
              echo "[+] Descargando gradle-wrapper.jar desde el repositorio de código oficial de Gradle..."
              curl -f -sSL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar || true
            fi
            
            # Método 3: Descargar de Spring Boot como fallback
            if ! validate_jar; then
              echo "[+] Descargando gradle-wrapper.jar de Spring Boot..."
              curl -f -sSL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/spring-projects/spring-boot/main/gradle/wrapper/gradle-wrapper.jar || true
            fi
          fi
          
          # Validación final del jar
          if validate_jar; then
            echo "[✓] ¡gradle-wrapper.jar restaurado con éxito ($(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes) y validado correctamente!"
          else
            echo "[⚠️] Advertencia extrema: No se pudo verificar ni descargar un gradle-wrapper.jar válido tras múltiples métodos."
          fi

      - name: Repair Corrupted mipmap-mdpi PNGs (Fix AAPT2 dimensions 0x0 error)
        run: |
          echo "[+] Reparando recursos mipmap..."
          cp android/app/src/main/res/mipmap-hdpi/*.png android/app/src/main/res/mipmap-mdpi/ || true
          echo "[✓] Mipmaps corregidos con éxito."

      - name: Apply Dynamic Version & Icon to Android App
        run: |
          # 1. Obtener la versión y número de build dinámicamente desde src/version.ts
          APP_VERSION=$(grep "export const VERSION" src/version.ts | cut -d'"' -f2 || echo "1.2.16")
          BUILD_NUM=$(grep "export const BUILD_NUMBER" src/version.ts | grep -o '[0-3][0-9]*' || echo "16")
          echo "[+] Configurando APK con Versión: $APP_VERSION (Código de compilación: $BUILD_NUM)"
          
          # Actualizar android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$APP_VERSION\"/g" android/app/build.gradle
          sed -i "s/versionCode .*/versionCode $BUILD_NUM/g" android/app/build.gradle
          
          # 2. Reemplazar los iconos mipmap con el logo oficial del dragón y configurar iconos adaptativos
          LOGO_PATH=""
          if [ -f assets/logo.png ]; then
            LOGO_PATH="assets/logo.png"
          elif [ -f src/assets/logo.png ]; then
            LOGO_PATH="src/assets/logo.png"
          fi
          
          if [ ! -z "$LOGO_PATH" ]; then
            echo "[+] Instalando logotipo oficial del Dragón CMineWar ($LOGO_PATH) como icono de la APK..."
            
            # Crear directorio anydpi-v26 si no existe y configurar iconos adaptativos
            mkdir -p android/app/src/main/res/mipmap-anydpi-v26
            
            echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' >> android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            echo '    <background android:drawable="@color/ic_launcher_background" />' >> android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            echo '    <foreground android:drawable="@mipmap/ic_launcher_foreground" />' >> android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
            echo '</adaptive-icon>' >> android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

            echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
            echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' >> android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
            echo '    <background android:drawable="@color/ic_launcher_background" />' >> android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
            echo '    <foreground android:drawable="@mipmap/ic_launcher_foreground" />' >> android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
            echo '</adaptive-icon>' >> android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
            
            # Asegurar color de fondo oscuro de marca (#020617)
            mkdir -p android/app/src/main/res/values
            echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/ic_launcher_background.xml
            echo '<resources>' >> android/app/src/main/res/values/ic_launcher_background.xml
            echo '    <color name="ic_launcher_background">#020617</color>' >> android/app/src/main/res/values/ic_launcher_background.xml
            echo '</resources>' >> android/app/src/main/res/values/ic_launcher_background.xml
            
            for mipmap in android/app/src/main/res/mipmap-*; do
              if [ -d "$mipmap" ]; then
                # Saltar directorios anydpi, ya que no están diseñados para contener imágenes PNG directas
                if [[ "$mipmap" == *"anydpi"* ]]; then
                  continue
                fi
                cp "$LOGO_PATH" "$mipmap/ic_launcher.png" || true
                cp "$LOGO_PATH" "$mipmap/ic_launcher_round.png" || true
                cp "$LOGO_PATH" "$mipmap/ic_launcher_foreground.png" || true
              fi
            done
            echo "[✓] Icono de launcher actualizado y adaptativos configurados correctamente."
          else
            echo "[⚠️] Advertencia: No se encontró el logotipo para el icono."
          fi

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          echo "[+] Ejecutando compilación del binario APK mediante Gradle..."
          ./gradlew assembleDebug --no-daemon --stacktrace || {
            echo "[!] Falló la compilación mediante gradlew wrapper. Intentando compilar usando el comando Gradle de sistema directamente..."
            gradle assembleDebug --no-daemon --stacktrace
          }
          APP_VERSION=$(grep "export const VERSION" ../src/version.ts | cut -d'"' -f2 || echo "1.2.16")
          cp app/build/outputs/apk/debug/app-debug.apk ../cminewar-remote-control.apk
          cp app/build/outputs/apk/debug/app-debug.apk ../cminewar-remote-control_v${APP_VERSION}.apk

      - name: Upload Remote Control APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cminewarOS_Remote_Control_APK
          path: |
            cminewar-remote-control.apk
            cminewar-remote-control_v*.apk
          retention-days: 7
          if-no-files-found: error

  build_deb:
    name: Compile and Package Debian App
    needs: increment_version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.increment_version.outputs.sha }}
          lfs: true

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web Application (React/Vite & Server)
        run: |
          npm run build

      - name: Package CMineWar OS Ubuntu/Debian Distribution Bundle
        run: |
          echo "[+] Preparando paquete de distribución de CMineWar OS para Ubuntu/Debian..."
          mkdir -p cminewar-ubuntu-amd64/bare-metal
          
          # Copiar archivos compilados y fuentes necesarios
          cp -r dist cminewar-ubuntu-amd64/
          cp package.json package-lock.json download-wrapper.cjs cminewar-ubuntu-amd64/
          cp -r bare-metal/* cminewar-ubuntu-amd64/bare-metal/
          
          # Asegurar permisos de ejecución correctos en los scripts de instalación física y servicios
          chmod +x cminewar-ubuntu-amd64/bare-metal/*.sh || true
          chmod +x cminewar-ubuntu-amd64/bare-metal/*.py || true
          
          # Comprimir en un archivo tar.gz
          tar -czf cminewarOS-Ubuntu-amd64.tar.gz cminewar-ubuntu-amd64/
          echo "[✓] Distribución cminewarOS-Ubuntu-amd64.tar.gz empaquetada con éxito."

      - name: Build Remote Control Debian Package (.deb)
        run: |
          echo "[+] Construyendo paquete .deb con la estructura de backend y control..."
          mkdir -p cminewar-package/DEBIAN
          mkdir -p cminewar-package/usr/bin
          mkdir -p cminewar-package/usr/share/applications
          mkdir -p cminewar-package/usr/share/cminewar/backend
          mkdir -p cminewar-package/usr/share/pixmaps
          mkdir -p cminewar-package/usr/local/bin
          mkdir -p cminewar-package/lib/systemd/system
          
          # Obtener la versión dinámicamente desde src/version.ts
          APP_VERSION=$(grep "export const VERSION" src/version.ts | cut -d'"' -f2 || echo "1.2.16")
          echo "[+] Versión detectada para el paquete .deb: $APP_VERSION"
          
          # Copiar la aplicación companion
          cp bare-metal/cminewar-companion.py cminewar-package/usr/share/cminewar/cminewar-companion.py
          
          # Copiar backend compilado (dist/ y node_modules/) y package.json
          cp -r dist cminewar-package/usr/share/cminewar/backend/
          cp -r node_modules cminewar-package/usr/share/cminewar/backend/ || true
          cp package.json cminewar-package/usr/share/cminewar/backend/
          
          # Copiar el logotipo de CMineWar para que sirva de icono de sistema en Debian
          if [ -f assets/logo.png ]; then
            cp assets/logo.png cminewar-package/usr/share/pixmaps/cminewar-companion.png
          elif [ -f src/assets/logo.png ]; then
            cp src/assets/logo.png cminewar-package/usr/share/pixmaps/cminewar-companion.png
          elif [ -f public/assets/branding/logo.png ]; then
            cp public/assets/branding/logo.png cminewar-package/usr/share/pixmaps/cminewar-companion.png
          fi
          
          # Crear script lanzador cminewar-companion
          cat << 'EOF' > cminewar-package/usr/bin/cminewar-companion
          #!/usr/bin/env bash
          python3 /usr/share/cminewar/cminewar-companion.py "$@"
          EOF
          
          # Crear archivo .desktop con soporte de iconos estandar de escritorio
          cat << 'EOF' > cminewar-package/usr/share/applications/cminewar-companion.desktop
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=CMineWar Remote Control
          Comment=Cliente de control remoto para servidores CMineWar OS
          Exec=/usr/bin/cminewar-companion
          Icon=/usr/share/pixmaps/cminewar-companion.png
          Terminal=false
          Categories=Utility;System;
          EOF
          
          # Crear script del cortafuegos cminewar-firewall
          cat << 'EOF' > cminewar-package/usr/local/bin/cminewar-firewall
          #!/usr/bin/env bash
          # =========================================================================
          # CONTROL DE CORTAFUEGOS CMINEWAR OS - TRÁFICO WAN / AISLAMIENTOS LOCALES DE RED
          # =========================================================================

          set -e

          if [ "$EUID" -ne 0 ]; then
            echo "[-] ERROR: Requiere privilegios de root."
            exit 1
          fi

          ACTION=$1

          if [ -z "$ACTION" ]; then
              echo "Uso: cminewar-firewall [block | allow | status]"
              echo ""
              echo "  block  - Bloquea todo el tráfico a Internet (WAN), manteniendo la red local libre."
              echo "  allow  - Permite libre acceso a internet (comportamiento estándar)."
              echo "  status - Muestra las reglas de filtrado de red de iptables vigentes."
              exit 0
          fi

          case "$ACTION" in
              block)
                  echo "[!] Activando reglas de aislamiento WAN en iptables..."
                  
                  # Guardar comportamiento actual para deshacer
                  iptables --flush OUTPUT || true
                  
                  # 1. Permitir todo el tráfico en la interfaz de bucle local (loopback)
                  iptables -A OUTPUT -o lo -j ACCEPT
                  
                  # 2. Permitir tráfico de salida con destino a redes locales privadas standard (LAN)
                  iptables -A OUTPUT -d 192.168.0.0/16 -j ACCEPT
                  iptables -A OUTPUT -d 172.16.0.0/12 -j ACCEPT
                  iptables -A OUTPUT -d 10.0.0.0/8 -j ACCEPT
                  
                  # 3. El resto del tráfico de salida hacia Internet (WAN) queda terminantemente bloqueado
                  iptables -P OUTPUT DROP
                  
                  # Guardar reglas de persistencia
                  if command -v iptables-save &> /dev/null; then
                      mkdir -p /etc/iptables || true
                      iptables-save > /etc/iptables/rules.v4 || true
                  fi
                  
                  echo "[✔] Cortafuegos ACTIVADO con Éxito."
                  echo "    El equipo se encuentra completamente aislado de la WAN (Internet)."
                  echo "    Acceso de administración LAN sigue 100% abierto."
                  ;;
                  
              allow)
                  echo "[+] Abriendo compuertas del Cortafuegos para libre acceso a Internet..."
                  
                  # Restaurar comportamiento de políticas por defecto
                  iptables -P OUTPUT ACCEPT
                  iptables --flush OUTPUT || true
                  
                  # Guardar reglas de persistencia
                  if command -v iptables-save &> /dev/null; then
                      mkdir -p /etc/iptables || true
                      iptables-save > /etc/iptables/rules.v4 || true
                  fi
                  
                  echo "[✔] Cortafuegos APAGADO con Éxito. Acceso a Internet completamente libre."
                  ;;
                  
              status)
                  echo "========================================================================="
                  echo "     ESTADO DE CONTROL DE RUTAS FÍSICAS DE RED DE CMINEWAR OS - IP_TABLES"
                  echo "========================================================================="
                  POLICY=$(iptables -S OUTPUT | grep "\-P" | awk '{print $3}')
                  if [ "$POLICY" = "DROP" ]; then
                      echo -e "ESTADO GLOBAL DE RED DE SALIDA: \033[31m🔒 WAN BLOQUEADA (Aislamiento LAN Activo)\033[0m"
                  else
                      echo -e "ESTADO GLOBAL DE RED DE SALIDA: \033[32m🟢 WAN + LAN LIBRES Y ABIERTAS\033[0m"
                  fi
                  echo ""
                  echo "Lista de reglas actuales de salida en iptables:"
                  iptables -L OUTPUT -n --line-numbers
                  ;;
                  
              *)
                  echo "[-] Dirección u opción desconocida. Usa block, allow o status."
                  exit 1
                  ;;
          esac
          EOF
          chmod 755 cminewar-package/usr/local/bin/cminewar-firewall
          
          # Crear archivo de servicio de systemd
          cat << 'EOF' > cminewar-package/lib/systemd/system/cminewar.service
          [Unit]
          Description=CMineWar OS - Estación Servidora Cognitiva
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/usr/share/cminewar/backend
          ExecStart=/usr/bin/node dist/server.cjs
          Restart=always
          RestartSec=5
          Environment=NODE_ENV=production PORT=3000

          [Install]
          WantedBy=multi-user.target
          EOF
          
          # Crear archivo control con dependencias actualizadas (nodejs, iptables)
          cat << EOF > cminewar-package/DEBIAN/control
          Package: cminewar-companion
          Version: $APP_VERSION
          Section: utils
          Priority: optional
          Architecture: all
          Depends: python3, python3-tk, nodejs, iptables
          Maintainer: CMineWar OS Team <CMineWar1.5@gmail.com>
          Description: Cliente de control remoto para la administracion de CMineWar OS.
           Una herramienta liviana en Python y Tkinter para controlar remotamente
           cortafuegos, servicios, actualizaciones de sistema y GRUB, y diagnosticos.
          EOF
          
          # Crear script postinst
          cat << 'EOF' > cminewar-package/DEBIAN/postinst
          #!/bin/sh
          # =========================================================================
          # SCRIPT POST-INSTALACIÓN (POSTINST) - CMINEWAR REMOTE CONTROL / BACKEND
          # =========================================================================
          set -e

          echo "[+] Ejecutando script post-instalación de CMineWar..."

          # 1. Asegurar permisos de ejecución explícitos en binarios y scripts en el sistema de archivos raíz
          echo "[+] Configurando permisos de ejecución para scripts y ejecutables..."
          chmod +x /usr/bin/cminewar-companion
          chmod +x /usr/share/cminewar/cminewar-companion.py
          chmod +x /usr/local/bin/cminewar-firewall

          # 2. Asegurar permisos correctos (644) en el acceso directo del escritorio (.desktop)
          DESKTOP_FILE="/usr/share/applications/cminewar-companion.desktop"
          if [ -f "$DESKTOP_FILE" ]; then
              echo "[+] Configurando permisos 644 para acceso de escritorio..."
              chmod 644 "$DESKTOP_FILE"
          fi

          # 3. Recargar e iniciar servicios de fondo mediante systemd usando rutas absolutas verificadas
          SYSTEMCTL_BIN=$(command -v systemctl || echo "/bin/systemctl")

          if [ -x "$SYSTEMCTL_BIN" ]; then
              echo "[+] Detectado systemctl en: $SYSTEMCTL_BIN"
              echo "[+] Recargando el demonio de systemd..."
              "$SYSTEMCTL_BIN" daemon-reload
              
              echo "[+] Habilitando el servicio cminewar.service..."
              "$SYSTEMCTL_BIN" enable cminewar.service
              
              echo "[+] Reiniciando el servicio cminewar.service..."
              "$SYSTEMCTL_BIN" restart cminewar.service
          else
              echo "[⚠️] Advertencia: systemctl no encontrado o no ejecutable. Ignorando inicio de servicio de fondo."
          fi

          echo "[✔] Despliegue completado con éxito."
          exit 0
          EOF
          chmod 755 cminewar-package/DEBIAN/postinst
          
          # Crear script prerm
          cat << 'EOF' > cminewar-package/DEBIAN/prerm
          #!/bin/sh
          set -e

          if [ "$1" = "remove" ] || [ "$1" = "purge" ]; then
              # Detener y deshabilitar el servicio de fondo
              if command -v systemctl >/dev/null 2>&1; then
                  systemctl stop cminewar.service || true
                  systemctl disable cminewar.service || true
              fi
          fi

          exit 0
          EOF
          chmod 755 cminewar-package/DEBIAN/prerm
          
          # Asegurar permisos correctos en toda la estructura del paquete .deb
          # utilizando el script de verificación y normalización automatizado
          chmod +x bare-metal/verify_deb_structure.sh
          ./bare-metal/verify_deb_structure.sh

          # Construir .deb
          dpkg-deb --build cminewar-package cminewar-companion.deb
          cp cminewar-companion.deb cminewar-companion_v${APP_VERSION}.deb
          echo "[✓] Paquete .deb cminewar-companion.deb (Versión $APP_VERSION) generado correctamente con estructura completa y scripts de control."

      - name: Upload Remote Control DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cminewarOS_Remote_Control_DEB
          path: |
            cminewar-companion.deb
            cminewar-companion_v*.deb
          retention-days: 7
          if-no-files-found: error

  build_iso:
    name: Compile Bare-metal and Live ISO
    needs: increment_version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.increment_version.outputs.sha }}
          lfs: true

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web Application (React/Vite & Server)
        run: |
          npm run build

      - name: Install Compilers & ISO Tools (NASM, MinGW, xorriso, mtools, dosfstools)
        run: |
          sudo apt-get update || echo "[⚠️] Advertencia: apt-get update falló, continuando con la instalación..."
          sudo apt-get install -y nasm gcc-mingw-w64-x86-64 xorriso mtools dosfstools

      - name: Compile BIOS MBR Bootsector (boot.asm)
        run: |
          nasm -f bin bare-metal/boot.asm -o bare-metal/boot.bin

      - name: Compile UEFI x86_64 System Loader (uefi_loader.c)
        run: |
          x86_64-w64-mingw32-gcc -fshort-wchar -nostdlib -shared -Wl,-dll -Wl,--subsystem,10 -e efi_main -o bare-metal/BOOTX64.EFI bare-metal/uefi_loader.c

      - name: Verify Compiled Binary Artifacts
        run: |
          echo "[+] Verificando existencia de binarios generados..."
          if [ -s "bare-metal/boot.bin" ]; then
            echo "[✓] boot.bin generado con éxito ($(wc -c < bare-metal/boot.bin) bytes)"
          else
            echo "[❌] Error: boot.bin no existe o está vacío"
            exit 1
          fi

          if [ -s "bare-metal/BOOTX64.EFI" ]; then
            echo "[✓] BOOTX64.EFI generado con éxito ($(wc -c < bare-metal/BOOTX64.EFI) bytes)"
          else
            echo "[❌] Error: BOOTX64.EFI no existe o está vacío"
            exit 1
          fi

      - name: Build Offline Debian Rootfs Archive
        run: |
          echo "[+] Instalando debootstrap para generar el rootfs offline..."
          sudo apt-get update || true
          sudo apt-get install -y debootstrap
          
          echo "[+] Generando estructura base con debootstrap (bookworm)..."
          sudo debootstrap --arch amd64 bookworm ./debian-rootfs http://deb.debian.org/debian
          
          echo "[+] Configurando repositorios para incluir non-free y firmware..."
          sudo bash -c 'echo "deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware" > ./debian-rootfs/etc/apt/sources.list'
          sudo bash -c 'echo "deb http://deb.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware" >> ./debian-rootfs/etc/apt/sources.list'
          sudo bash -c 'echo "deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware" >> ./debian-rootfs/etc/apt/sources.list'
          
          echo "[+] Instalando Kernel, Sistema Base y Entorno XFCE4 en el rootfs de forma pre-empaquetada..."
          sudo DEBIAN_FRONTEND=noninteractive chroot ./debian-rootfs apt-get update
          sudo DEBIAN_FRONTEND=noninteractive chroot ./debian-rootfs apt-get install -y \
            --no-install-recommends \
            linux-image-amd64 \
            grub-efi-amd64 \
            efibootmgr \
            sudo \
            network-manager \
            xfce4 \
            openbox \
            lightdm \
            lightdm-gtk-greeter \
            xserver-xorg \
            xserver-xorg-video-all \
            xserver-xorg-input-all \
            xinit \
            dbus-x11 \
            nodejs \
            npm \
            curl \
            python3-tk \
            python3-pip \
            systemd-sysv
          
          echo "[+] Limpiando caché de apt para optimizar espacio..."
          sudo DEBIAN_FRONTEND=noninteractive chroot ./debian-rootfs apt-get clean
          sudo rm -rf ./debian-rootfs/var/lib/apt/lists/*
          
          echo "[+] Empaquetando rootfs en gzip ultra-rápido..."
          sudo tar -czf bare-metal/rootfs.tar.gz -C ./debian-rootfs .
          echo "[✓] Archivo de instalación offline 'rootfs.tar.gz' creado con éxito."

      - name: Build Dual-Boot (BIOS & UEFI) Bootable ISO Image
        run: |
          echo "[+] Preparando la estructura de la ISO arrancable..."
          mkdir -p iso_root/bare-metal
          
          # Asegurar que las herramientas de sistema (/sbin y /usr/sbin) están en el PATH
          export PATH=$PATH:/sbin:/usr/sbin
          
          # 1. Preparar la imagen UEFI FAT12/FAT16/FAT32 (efi.img) conteniendo BOOTX64.EFI
          # Creamos un archivo de 1.44MB (disquete estándar para compatibilidad universal)
          dd if=/dev/zero of=bare-metal/efi.img bs=1024 count=1440
          
          # Usar MTOOLS_SKIP_CHECK=1 para evitar advertencias de geometría o fallas en el entorno headless
          export MTOOLS_SKIP_CHECK=1
          
          if ! mkfs.vfat -I -F 12 bare-metal/efi.img; then
            echo "[⚠️] Advertencia: mkfs.vfat con -F 12 falló, intentando con mformat de mtools..."
            mformat -f 1440 -v "EFI-BOOT" -i bare-metal/efi.img :: || {
              echo "[⚠️] Advertencia: mformat también falló, intentando formato mkfs.vfat básico..."
              mkfs.vfat -I bare-metal/efi.img || echo "[❌] Advertencia: No se pudo formatear efi.img de forma limpia"
            }
          fi
          
          mmd -i bare-metal/efi.img ::/EFI || true
          mmd -i bare-metal/efi.img ::/EFI/BOOT || true
          mcopy -o -i bare-metal/efi.img bare-metal/BOOTX64.EFI ::/EFI/BOOT/BOOTX64.EFI || {
            echo "[❌] Error: Falló la copia de BOOTX64.EFI a efi.img"
            exit 1
          }
          
          # Verificar si BOOTX64.EFI está en la imagen para evitar fallos de compilación silenciosos
          if mdir -i bare-metal/efi.img ::/EFI/BOOT/BOOTX64.EFI >/dev/null 2>&1; then
            echo "[✓] BOOTX64.EFI verificado correctamente dentro de efi.img"
          else
            echo "[❌] Error crítico: BOOTX64.EFI no existe dentro de la imagen de arranque UEFI efi.img generada"
            exit 1
          fi
          
          # 2. Rellenar boot.bin con ceros hasta completar 2048 bytes para El Torito (sin emulación)
          dd if=/dev/zero of=bare-metal/boot2048.bin bs=1 count=2048
          dd if=bare-metal/boot.bin of=bare-metal/boot2048.bin conv=notrunc
          
          # 3. Copiar archivos del sistema a la estructura de la ISO
          cp -r dist iso_root/
          cp package.json package-lock.json download-wrapper.cjs iso_root/
          cp -r node_modules iso_root/ || true
          cp -r bare-metal/* iso_root/bare-metal/
          cp bare-metal/rootfs.tar.gz iso_root/rootfs.tar.gz || true
          
          # Copiar los cargadores de arranque necesarios a la raíz para que El Torito los encuentre
          cp bare-metal/boot2048.bin iso_root/boot.bin
          cp bare-metal/efi.img iso_root/efi.img
          
          # 4. Compilar la ISO híbrida dual-boot usando xorriso con soporte completo UEFI y BIOS El Torito
          # Intentamos primero la configuración dual-boot recomendada con -e efi.img
          echo "[+] Intentando compilar ISO híbrida Dual-Boot (BIOS + UEFI) - Método A..."
          if xorriso -as mkisofs \
            -V "cminewarOS" \
            -o cminewarOS-live.iso \
            -b boot.bin \
            -c boot.catalog \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot \
            -e efi.img \
            -no-emul-boot \
            iso_root/; then
            echo "[✓] ISO arrancable dual-boot 'cminewarOS-live.iso' generada con éxito usando Método A (estándar -e)."
          else
            echo "[⚠️] Método A de xorriso falló. Intentando Método B (con plataforma EFI explícita)..."
            if xorriso -as mkisofs \
              -V "cminewarOS" \
              -o cminewarOS-live.iso \
              -b boot.bin \
              -c boot.catalog \
              -no-emul-boot -boot-load-size 4 -boot-info-table \
              -eltorito-alt-boot \
              -eltorito-platform efi \
              -eltorito-boot efi.img \
              -no-emul-boot \
              iso_root/; then
              echo "[✓] ISO arrancable dual-boot 'cminewarOS-live.iso' generada con éxito usando Método B (plataforma EFI)."
            else
              echo "[⚠️] Ambos métodos híbridos fallaron. Intentando generar ISO de compatibilidad básica (Solo BIOS) como último recurso..."
              xorriso -as mkisofs \
                -V "cminewarOS" \
                -o cminewarOS-live.iso \
                -b boot.bin \
                -c boot.catalog \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                iso_root/
              echo "[✓] ISO arrancable (Solo BIOS) generada con éxito como fallback seguro."
            fi
          fi
          APP_VERSION=$(grep "export const VERSION" src/version.ts | cut -d'"' -f2 || echo "1.2.16")
          cp cminewarOS-live.iso "cminewarOS-live_v${APP_VERSION}.iso" || true

      - name: Upload Bootable ISO Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cminewarOS_Live_Bootable_ISO
          path: |
            cminewarOS-live.iso
            cminewarOS-live_v*.iso
          retention-days: 7
          if-no-files-found: error

  release_assets:
    name: Publish Releases and Share Compiled Files Publicly
    needs: [build_android, build_deb, build_iso]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download Android APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: cminewarOS_Remote_Control_APK
          path: .

      - name: Download Debian Package Artifact
        uses: actions/download-artifact@v4
        with:
          name: cminewarOS_Remote_Control_DEB
          path: .

      - name: Download Bootable ISO Artifact
        uses: actions/download-artifact@v4
        with:
          name: cminewarOS_Live_Bootable_ISO
          path: .

      - name: Release and Share Compiled Files Publicly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Obtener la versión dinámicamente desde src/version.ts
          APP_VERSION=$(grep "export const VERSION" src/version.ts | cut -d'"' -f2 || echo "1.2.16")
          BUILD_NUM=$(grep "export const BUILD_NUMBER" src/version.ts | grep -o '[0-3][0-9]*' || echo "16")
          TAG_NAME="v$APP_VERSION"
          
          echo "[+] Preparando publicación pública de la versión $TAG_NAME (Build #$BUILD_NUM)..."
          
          # Asegurar que los archivos están en la raíz antes de agregarlos con git
          cp cminewar-remote-control.apk ./cminewar-remote-control.apk || true
          cp cminewar-companion.deb ./cminewar-companion.deb || true
          cp cminewarOS-live.iso ./cminewarOS-live.iso || true



          # Renombrar los archivos para que tengan el número de versión correcto e identificadores claros para la release
          cp cminewar-remote-control.apk "cminewar-remote-control_v${APP_VERSION}.apk" || true
          cp cminewar-companion.deb "cminewar-companion_v${APP_VERSION}.deb" || true
          cp cminewarOS-live.iso "cminewarOS-live_v${APP_VERSION}.iso" || true
          
          # Generar notas de la release específica a un archivo intermedio (evita errores de indentación YAML)
          echo "### 🐉 CMineWar OS v${APP_VERSION} (Compilación #${BUILD_NUM})" > release_notes_version.md
          echo "" >> release_notes_version.md
          echo "Esta versión ha sido compilada y empaquetada de forma automática por el pipeline continuo de integración de GitHub Actions." >> release_notes_version.md
          echo "" >> release_notes_version.md
          echo "#### 📦 Descarga de Binarios Públicos:" >> release_notes_version.md
          echo "*   📱 **Android App (Remote Control APK)**: [cminewar-remote-control_v${APP_VERSION}.apk](https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/cminewar-remote-control_v${APP_VERSION}.apk)" >> release_notes_version.md
          echo "*   💻 **Debian Companion Package (DEB)**: [cminewar-companion_v${APP_VERSION}.deb](https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/cminewar-companion_v${APP_VERSION}.deb)" >> release_notes_version.md
          echo "*   💿 **Live Bootable ISO Image (ISO)**: [cminewarOS-live_v${APP_VERSION}.iso](https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/cminewarOS-live_v${APP_VERSION}.iso)" >> release_notes_version.md
          echo "" >> release_notes_version.md
          echo "*Fecha de compilación:* $(date -u)" >> release_notes_version.md
          
          # Generar notas de la release fija 'latest' a otro archivo intermedio
          echo "### 🐉 Enlaces de Descarga Directa y Permanente (Siempre actualizados):" > release_notes_latest.md
          echo "" >> release_notes_latest.md
          echo "Utiliza estos enlaces estáticos para integrarlos en tus scripts de instalación o descargas rápidas en tus sistemas:" >> release_notes_latest.md
          echo "" >> release_notes_latest.md
          echo "*   📱 **Android App (Remote Control APK)**: [Descargar Última APK](https://github.com/${{ github.repository }}/releases/download/latest/cminewar-remote-control.apk)" >> release_notes_latest.md
          echo "*   💻 **Debian Companion Package (DEB)**: [Descargar Último .deb](https://github.com/${{ github.repository }}/releases/download/latest/cminewar-companion.deb) (Instalar con \`sudo dpkg -i\`)" >> release_notes_latest.md
          echo "*   💿 **Live Bootable ISO Image (ISO)**: [Descargar Última ISO](https://github.com/${{ github.repository }}/releases/download/latest/cminewarOS-live.iso)" >> release_notes_latest.md
          echo "" >> release_notes_latest.md
          echo "*Compilado dinámicamente desde el núcleo cognitivo:* Versión v${APP_VERSION} (Compilación #${BUILD_NUM}) en fecha $(date -u)" >> release_notes_latest.md
          
          # Crear o actualizar release de la versión específica
          echo "[+] Eliminando tag y release anteriores para evitar conflictos..."
          gh release delete "$TAG_NAME" --yes || true
          git tag -d "$TAG_NAME" || true
          git push origin :refs/tags/"$TAG_NAME" || true
          
          echo "[+] Creando GitHub Release para $TAG_NAME..."
          gh release create "$TAG_NAME" \
            "cminewar-remote-control_v${APP_VERSION}.apk" \
            "cminewar-companion_v${APP_VERSION}.deb" \
            "cminewarOS-live_v${APP_VERSION}.iso" \
            --title "CMineWar OS v${APP_VERSION} (Compilación #${BUILD_NUM})" \
            --notes-file release_notes_version.md \
            --prerelease=false || echo "[⚠️] Falló la creación de la release de versión, continuando..."
             
          # Crear o actualizar una release fija 'latest' para enlaces de descarga permanentes
          echo "[+] Eliminando tag 'latest' y release anteriores..."
          gh release delete "latest" --yes || true
          git tag -d "latest" || true
          git push origin :refs/tags/"latest" || true
          
          echo "[+] Creando GitHub Release estática 'latest'..."
          gh release create "latest" \
            "cminewar-remote-control.apk" \
            "cminewar-companion.deb" \
            "cminewarOS-live.iso" \
            --title "CMineWar OS (Última compilación de producción)" \
            --notes-file release_notes_latest.md \
            --prerelease=false || echo "[⚠️] Falló la creación de la release 'latest', continuando..."

