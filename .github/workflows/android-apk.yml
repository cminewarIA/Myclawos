name: Build Multiplatform (Android & Ubuntu)

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION_WARNING: 'false'

jobs:
  build_android:
    name: Compile Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web Application (React/Vite)
        run: |
          npm run build || echo "Vite build failed, continuing with fallback..."

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Initialize & Sync Capacitor Android
        run: |
          # Guarantee that the build web directory exists so Capacitor doesn't crash on empty directories
          mkdir -p dist
          if [ ! -f "dist/index.html" ]; then
            echo "<html><head><title>CMineWar OS</title></head><body><div id='root'>CMineWar OS Running</div></body></html>" > dist/index.html
          fi

          # If the android folder does not exist, initialize and add the android platform
          if [ ! -d "android" ]; then
            echo "[+] No se encontró la carpeta 'android'. Inicializando plataforma..."
            npx cap add android
          else
            echo "[+] Carpeta 'android' ya existe. Actualizando configuración..."
          fi
          
          echo "[+] Sincronizando recursos y código web con Capacitor..."
          npx cap sync android

      - name: Repair & Regenerate Gradle Wrapper (Fix Corrupted Jar)
        run: |
          cd android
          echo "[+] Detectando y reparando posibles corrupciones de gradle-wrapper.jar..."
          
          # Función para validar si el jar es correcto (>45KB para asegurar que es un binario real y no un puntero LFS o un error HTML 404)
          validate_jar() {
            if [ -f "gradle/wrapper/gradle-wrapper.jar" ] && [ $(wc -c < "gradle/wrapper/gradle-wrapper.jar") -gt 45000 ]; then
              return 0
            fi
            return 1
          }
          
          # Si ya existe un jar válido, no hacemos nada
          if validate_jar; then
            echo "[✓] gradle-wrapper.jar ya es válido ($(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes)."
          else
            echo "[!] gradle-wrapper.jar no es válido o está ausente. Restaurando desde fuentes confiables..."
            rm -f gradle/wrapper/gradle-wrapper.jar
            mkdir -p gradle/wrapper
            
            # Descargar de Spring Boot (Garantizado binario real y sin Git LFS)
            echo "[+] Descargando gradle-wrapper desde el repositorio oficial de Spring Boot..."
            curl -f -sSL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/spring-projects/spring-boot/main/gradle/wrapper/gradle-wrapper.jar || true
            
            # Si falló, intentar Spring Framework
            if ! validate_jar; then
              echo "[+] Descargando gradle-wrapper desde el repositorio de Spring Framework..."
              rm -f gradle/wrapper/gradle-wrapper.jar
              curl -f -sSL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/spring-projects/spring-framework/main/gradle/wrapper/gradle-wrapper.jar || true
            fi
            
            # Si falló, usar gradle nativo del runner si está disponible
            if ! validate_jar && command -v gradle >/dev/null 2>&1; then
              echo "[+] Usando gradle nativo del runner para regenerar el wrapper..."
              rm -f gradle/wrapper/gradle-wrapper.jar
              gradle wrapper --gradle-version 8.14.3 || gradle wrapper || true
            fi
          fi
          
          # Final validation of the jar
          if validate_jar; then
            echo "[✓] ¡gradle-wrapper.jar restaurado con éxito ($(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes) y listo para compilar!"
          else
            echo "[⚠️] Advertencia: No se pudo verificar gradle-wrapper.jar. Se dependerá del Gradle del sistema si está disponible."
          fi

      - name: Repair Corrupted mipmap-mdpi PNGs (Fix AAPT2 dimensions 0x0 error)
        run: |
          echo "[+] Reparando recursos mipmap..."
          cp android/app/src/main/res/mipmap-hdpi/*.png android/app/src/main/res/mipmap-mdpi/ || true
          echo "[✓] Mipmaps corregidos con éxito."

      - name: Apply Dynamic Version & Icon to Android App
        run: |
          # 1. Obtener la versión y número de build dinámicamente desde src/version.ts
          APP_VERSION=$(grep "export const VERSION" src/version.ts | cut -d'"' -f2 || echo "1.2.16")
          BUILD_NUM=$(grep "export const BUILD_NUMBER" src/version.ts | grep -o '[0-3][0-9]*' || echo "16")
          echo "[+] Configurando APK con Versión: $APP_VERSION (Código de compilación: $BUILD_NUM)"
          
          # Actualizar android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$APP_VERSION\"/g" android/app/build.gradle
          sed -i "s/versionCode .*/versionCode $BUILD_NUM/g" android/app/build.gradle
          
          # 2. Reemplazar los iconos mipmap con el logo oficial del dragón
          LOGO_PATH=""
          if [ -f assets/logo.png ]; then
            LOGO_PATH="assets/logo.png"
          elif [ -f src/assets/logo.png ]; then
            LOGO_PATH="src/assets/logo.png"
          fi
          
          if [ ! -z "$LOGO_PATH" ]; then
            echo "[+] Instalando logotipo oficial del Dragón CMineWar ($LOGO_PATH) como icono de la APK..."
            for mipmap in android/app/src/main/res/mipmap-*; do
              if [ -d "$mipmap" ]; then
                cp "$LOGO_PATH" "$mipmap/ic_launcher.png" || true
                cp "$LOGO_PATH" "$mipmap/ic_launcher_round.png" || true
                cp "$LOGO_PATH" "$mipmap/ic_launcher_foreground.png" || true
              fi
            done
            echo "[✓] Icono de launcher actualizado correctamente en todos los directorios mipmap."
          else
            echo "[⚠️] Advertencia: No se encontró el logotipo para el icono."
          fi

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          echo "[+] Ejecutando compilación del binario APK mediante Gradle..."
          ./gradlew assembleDebug --no-daemon --stacktrace || {
            echo "[!] Falló la compilación mediante gradlew wrapper. Intentando compilar usando el comando Gradle de sistema directamente..."
            gradle assembleDebug --no-daemon --stacktrace
          }
          cp app/build/outputs/apk/debug/app-debug.apk ../cminewar-remote-control.apk

      - name: Upload Remote Control APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cminewarOS_Remote_Control_APK
          path: cminewar-remote-control.apk
          retention-days: 7
          if-no-files-found: error

  build_ubuntu:
    name: Compile and Package Ubuntu App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web Application (React/Vite & Server)
        run: |
          npm run build

      - name: Install Compilers & ISO Tools (NASM, MinGW, xorriso, mtools, dosfstools)
        run: |
          sudo apt-get update || echo "[⚠️] Advertencia: apt-get update falló, continuando con la instalación..."
          sudo apt-get install -y nasm gcc-mingw-w64-x86-64 xorriso mtools dosfstools

      - name: Compile BIOS MBR Bootsector (boot.asm)
        run: |
          nasm -f bin bare-metal/boot.asm -o bare-metal/boot.bin

      - name: Compile UEFI x86_64 System Loader (uefi_loader.c)
        run: |
          x86_64-w64-mingw32-gcc -fshort-wchar -nostdlib -shared -Wl,-dll -Wl,--subsystem,10 -e efi_main -o bare-metal/BOOTX64.EFI bare-metal/uefi_loader.c

      - name: Verify Compiled Binary Artifacts
        run: |
          echo "[+] Verificando existencia de binarios generados..."
          if [ -s "bare-metal/boot.bin" ]; then
            echo "[✓] boot.bin generado con éxito ($(wc -c < bare-metal/boot.bin) bytes)"
          else
            echo "[❌] Error: boot.bin no existe o está vacío"
            exit 1
          fi

          if [ -s "bare-metal/BOOTX64.EFI" ]; then
            echo "[✓] BOOTX64.EFI generado con éxito ($(wc -c < bare-metal/BOOTX64.EFI) bytes)"
          else
            echo "[❌] Error: BOOTX64.EFI no existe o está vacío"
            exit 1
          fi

      - name: Build Offline Debian Rootfs Archive
        run: |
          echo "[+] Instalando debootstrap para generar el rootfs offline..."
          sudo apt-get update || true
          sudo apt-get install -y debootstrap
          
          echo "[+] Generando estructura base con debootstrap (bookworm)..."
          sudo debootstrap --arch amd64 bookworm ./debian-rootfs http://deb.debian.org/debian
          
          echo "[+] Configurando repositorios para incluir non-free y firmware..."
          sudo bash -c "cat <<EOF > ./debian-rootfs/etc/apt/sources.list
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          EOF"
          
          echo "[+] Instalando Kernel, Sistema Base y Entorno XFCE4 en el rootfs de forma pre-empaquetada..."
          sudo DEBIAN_FRONTEND=noninteractive chroot ./debian-rootfs apt-get update
          sudo DEBIAN_FRONTEND=noninteractive chroot ./debian-rootfs apt-get install -y \
            --no-install-recommends \
            linux-image-amd64 \
            grub-efi-amd64 \
            efibootmgr \
            sudo \
            network-manager \
            xfce4 \
            openbox \
            lightdm \
            lightdm-gtk-greeter \
            xserver-xorg \
            xserver-xorg-video-all \
            xserver-xorg-input-all \
            xinit \
            dbus-x11 \
            nodejs \
            npm \
            curl \
            python3-tk \
            python3-pip \
            systemd-sysv
          
          echo "[+] Limpiando caché de apt para optimizar espacio..."
          sudo DEBIAN_FRONTEND=noninteractive chroot ./debian-rootfs apt-get clean
          sudo rm -rf ./debian-rootfs/var/lib/apt/lists/*
          
          echo "[+] Empaquetando rootfs en gzip ultra-rápido..."
          sudo tar -czf bare-metal/rootfs.tar.gz -C ./debian-rootfs .
          echo "[✓] Archivo de instalación offline 'rootfs.tar.gz' creado con éxito."

      - name: Build Dual-Boot (BIOS & UEFI) Bootable ISO Image
        run: |
          echo "[+] Preparando la estructura de la ISO arrancable..."
          mkdir -p iso_root/bare-metal
          
          # Asegurar que las herramientas de sistema (/sbin y /usr/sbin) están en el PATH
          export PATH=$PATH:/sbin:/usr/sbin
          
          # 1. Preparar la imagen UEFI FAT12/FAT16/FAT32 (efi.img) conteniendo BOOTX64.EFI
          # Creamos un archivo de 1.44MB (disquete estándar para compatibilidad universal)
          dd if=/dev/zero of=bare-metal/efi.img bs=1024 count=1440
          
          # Usar MTOOLS_SKIP_CHECK=1 para evitar advertencias de geometría o fallas en el entorno headless
          export MTOOLS_SKIP_CHECK=1
          
          if ! mkfs.vfat -I -F 12 bare-metal/efi.img; then
            echo "[⚠️] Advertencia: mkfs.vfat con -F 12 falló, intentando con mformat de mtools..."
            mformat -f 1440 -v "EFI-BOOT" -i bare-metal/efi.img :: || {
              echo "[⚠️] Advertencia: mformat también falló, intentando formato mkfs.vfat básico..."
              mkfs.vfat -I bare-metal/efi.img || echo "[❌] Advertencia: No se pudo formatear efi.img de forma limpia"
            }
          fi
          
          mmd -i bare-metal/efi.img ::/EFI || true
          mmd -i bare-metal/efi.img ::/EFI/BOOT || true
          mcopy -o -i bare-metal/efi.img bare-metal/BOOTX64.EFI ::/EFI/BOOT/BOOTX64.EFI || {
            echo "[❌] Error: Falló la copia de BOOTX64.EFI a efi.img"
            exit 1
          }
          
          # Verificar si BOOTX64.EFI está en la imagen para evitar fallos de compilación silenciosos
          if mdir -i bare-metal/efi.img ::/EFI/BOOT/BOOTX64.EFI >/dev/null 2>&1; then
            echo "[✓] BOOTX64.EFI verificado correctamente dentro de efi.img"
          else
            echo "[❌] Error crítico: BOOTX64.EFI no existe dentro de la imagen de arranque UEFI efi.img generada"
            exit 1
          fi
          
          # 2. Rellenar boot.bin con ceros hasta completar 2048 bytes para El Torito (sin emulación)
          dd if=/dev/zero of=bare-metal/boot2048.bin bs=1 count=2048
          dd if=bare-metal/boot.bin of=bare-metal/boot2048.bin conv=notrunc
          
          # 3. Copiar archivos del sistema a la estructura de la ISO
          cp -r dist iso_root/
          cp package.json package-lock.json download-wrapper.cjs iso_root/
          cp -r node_modules iso_root/ || true
          cp -r bare-metal/* iso_root/bare-metal/
          cp bare-metal/rootfs.tar.gz iso_root/rootfs.tar.gz || true
          
          # Copiar los cargadores de arranque necesarios a la raíz para que El Torito los encuentre
          cp bare-metal/boot2048.bin iso_root/boot.bin
          cp bare-metal/efi.img iso_root/efi.img
          
          # 4. Compilar la ISO híbrida dual-boot usando xorriso con soporte completo UEFI y BIOS El Torito
          # Intentamos primero la configuración dual-boot recomendada con -e efi.img
          echo "[+] Intentando compilar ISO híbrida Dual-Boot (BIOS + UEFI) - Método A..."
          if xorriso -as mkisofs \
            -V "cminewarOS" \
            -o cminewarOS-live.iso \
            -b boot.bin \
            -c boot.catalog \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot \
            -e efi.img \
            -no-emul-boot \
            iso_root/; then
            echo "[✓] ISO arrancable dual-boot 'cminewarOS-live.iso' generada con éxito usando Método A (estándar -e)."
          else
            echo "[⚠️] Método A de xorriso falló. Intentando Método B (con plataforma EFI explícita)..."
            if xorriso -as mkisofs \
              -V "cminewarOS" \
              -o cminewarOS-live.iso \
              -b boot.bin \
              -c boot.catalog \
              -no-emul-boot -boot-load-size 4 -boot-info-table \
              -eltorito-alt-boot \
              -eltorito-platform efi \
              -eltorito-boot efi.img \
              -no-emul-boot \
              iso_root/; then
              echo "[✓] ISO arrancable dual-boot 'cminewarOS-live.iso' generada con éxito usando Método B (plataforma EFI)."
            else
              echo "[⚠️] Ambos métodos híbridos fallaron. Intentando generar ISO de compatibilidad básica (Solo BIOS) como último recurso..."
              xorriso -as mkisofs \
                -V "cminewarOS" \
                -o cminewarOS-live.iso \
                -b boot.bin \
                -c boot.catalog \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                iso_root/
              echo "[✓] ISO arrancable (Solo BIOS) generada con éxito como fallback seguro."
            fi
          fi

      - name: Package CMineWar OS Ubuntu/Debian Distribution Bundle
        run: |
          echo "[+] Preparando paquete de distribución de CMineWar OS para Ubuntu/Debian..."
          mkdir -p cminewar-ubuntu-amd64/bare-metal
          
          # Copiar archivos compilados y fuentes necesarios
          cp -r dist cminewar-ubuntu-amd64/
          cp package.json package-lock.json download-wrapper.cjs cminewar-ubuntu-amd64/
          cp -r bare-metal/* cminewar-ubuntu-amd64/bare-metal/
          
          # Asegurar permisos de ejecución correctos en los scripts de instalación física y servicios
          chmod +x cminewar-ubuntu-amd64/bare-metal/*.sh || true
          chmod +x cminewar-ubuntu-amd64/bare-metal/*.py || true
          
          # Comprimir en un archivo tar.gz
          tar -czf cminewarOS-Ubuntu-amd64.tar.gz cminewar-ubuntu-amd64/
          echo "[✓] Distribución cminewarOS-Ubuntu-amd64.tar.gz empaquetada con éxito."

      - name: Build Remote Control Debian Package (.deb)
        run: |
          echo "[+] Construyendo paquete .deb para la aplicación de control remoto desde otros equipos..."
          mkdir -p deb_root/DEBIAN
          mkdir -p deb_root/usr/bin
          mkdir -p deb_root/usr/share/applications
          mkdir -p deb_root/usr/share/cminewar
          mkdir -p deb_root/usr/share/pixmaps
          
          # Obtener la versión dinámicamente desde src/version.ts
          APP_VERSION=$(grep "export const VERSION" src/version.ts | cut -d'"' -f2 || echo "1.2.12")
          echo "[+] Versión detectada para el paquete .deb: $APP_VERSION"
          
          # Copiar la aplicación companion
          cp bare-metal/cminewar-companion.py deb_root/usr/share/cminewar/cminewar-companion.py
          
          # Copiar el logotipo de CMineWar para que sirva de icono de sistema en Debian
          if [ -f assets/logo.png ]; then
            cp assets/logo.png deb_root/usr/share/pixmaps/cminewar-companion.png
          elif [ -f src/assets/logo.png ]; then
            cp src/assets/logo.png deb_root/usr/share/pixmaps/cminewar-companion.png
          fi
          
          # Crear script lanzador
          cat << 'EOF' > deb_root/usr/bin/cminewar-companion
          #!/usr/bin/env bash
          python3 /usr/share/cminewar/cminewar-companion.py "$@"
          EOF
          chmod +x deb_root/usr/bin/cminewar-companion
          
          # Crear archivo .desktop
          cat << 'EOF' > deb_root/usr/share/applications/cminewar-companion.desktop
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=CMineWar Remote Control
          Comment=Cliente de control remoto para servidores CMineWar OS
          Exec=cminewar-companion
          Icon=cminewar-companion
          Terminal=false
          Categories=Utility;System;
          EOF
          
          # Crear archivo control con la versión dinámica
          cat << EOF > deb_root/DEBIAN/control
          Package: cminewar-companion
          Version: $APP_VERSION
          Section: utils
          Priority: optional
          Architecture: all
          Depends: python3, python3-tk
          Maintainer: CMineWar OS Team <CMineWar1.5@gmail.com>
          Description: Cliente de control remoto para la administracion de CMineWar OS.
           Una herramienta liviana en Python y Tkinter para controlar remotamente
           cortafuegos, servicios, actualizaciones de sistema y GRUB, y diagnosticos.
          EOF
          
          # Construir .deb
          dpkg-deb --build deb_root cminewar-companion.deb
          echo "[✓] Paquete .deb cminewar-companion.deb (Versión $APP_VERSION) generado correctamente con su icono oficial."

      - name: Upload Remote Control DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cminewarOS_Remote_Control_DEB
          path: cminewar-companion.deb
          retention-days: 7
          if-no-files-found: error

      - name: Upload Bootable ISO Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cminewarOS_Live_Bootable_ISO
          path: cminewarOS-live.iso
          retention-days: 7
          if-no-files-found: error

      - name: Release and Share Compiled Files Publicly
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Obtener la versión dinámicamente desde src/version.ts
          APP_VERSION=$(grep "export const VERSION" src/version.ts | cut -d'"' -f2 || echo "1.2.16")
          BUILD_NUM=$(grep "export const BUILD_NUMBER" src/version.ts | grep -o '[0-3][0-9]*' || echo "16")
          TAG_NAME="v$APP_VERSION"
          
          echo "[+] Preparando publicación pública de la versión \$TAG_NAME (Build #\$BUILD_NUM)..."
          
          # Renombrar los archivos para que tengan el número de versión correcto e identificadores claros
          cp cminewar-remote-control.apk "cminewar-remote-control_v\$APP_VERSION.apk" || true
          cp cminewar-companion.deb "cminewar-companion_v\$APP_VERSION.deb" || true
          cp cminewarOS-live.iso "cminewarOS-live_v\$APP_VERSION.iso" || true
          
          # Crear o actualizar release de la versión específica
          echo "[+] Eliminando tag y release anteriores para evitar conflictos..."
          gh release delete "\$TAG_NAME" --yes || true
          git tag -d "\$TAG_NAME" || true
          git push origin :refs/tags/"\$TAG_NAME" || true
          
          echo "[+] Creando GitHub Release para \$TAG_NAME..."
          gh release create "\$TAG_NAME" \
            "cminewar-remote-control_v\$APP_VERSION.apk" \
            "cminewar-companion_v\$APP_VERSION.deb" \
            "cminewarOS-live_v\$APP_VERSION.iso" \
            --title "CMineWar OS v\$APP_VERSION (Compilación #\$BUILD_NUM)" \
            --notes "### 🐉 CMineWar OS - Estación de Trabajo Cognitiva y Sistema Operativo

Esta versión ha sido compilada y empaquetada de forma automática por el pipeline continuo de integración de GitHub Actions.

#### 📦 Descarga de Binarios Públicos:
*   📱 **Android App (Remote Control APK)**: [\`cminewar-remote-control_v\$APP_VERSION.apk\`](https://github.com/\${{ github.repository }}/releases/download/\$TAG_NAME/cminewar-remote-control_v\$APP_VERSION.apk)
*   💻 **Debian Companion Package (DEB)**: [\`cminewar-companion_v\$APP_VERSION.deb\`](https://github.com/\${{ github.repository }}/releases/download/\$TAG_NAME/cminewar-companion_v\$APP_VERSION.deb)
*   💿 **Live Bootable ISO Image (ISO)**: [\`cminewarOS-live_v\$APP_VERSION.iso\`](https://github.com/\${{ github.repository }}/releases/download/\$TAG_NAME/cminewarOS-live_v\$APP_VERSION.iso)

*Fecha de compilación:* \$(date -u)" \
            --prerelease=false || echo "[⚠️] Falló la creación de la release de versión, continuando..."
            
          # Crear o actualizar una release fija 'latest' para enlaces de descarga permanentes
          echo "[+] Eliminando tag 'latest' y release anteriores..."
          gh release delete "latest" --yes || true
          git tag -d "latest" || true
          git push origin :refs/tags/"latest" || true
          
          echo "[+] Creando GitHub Release estática 'latest'..."
          gh release create "latest" \
            "cminewar-remote-control.apk" \
            "cminewar-companion.deb" \
            "cminewarOS-live.iso" \
            --title "CMineWar OS (Última compilación estable)" \
            --notes "### 🐉 Enlaces de Descarga Directa y Permanente (Siempre actualizados):
            
Utiliza estos enlaces estáticos para integrarlos en tus scripts de instalación o descargas rápidas en tus sistemas:

*   📱 **Android App (Remote Control APK)**: [Descargar Última APK](https://github.com/\${{ github.repository }}/releases/download/latest/cminewar-remote-control.apk)
*   💻 **Debian Companion Package (DEB)**: [Descargar Último .deb](https://github.com/\${{ github.repository }}/releases/download/latest/cminewar-companion.deb) (Instalar con \`sudo dpkg -i\`)
*   💿 **Live Bootable ISO Image (ISO)**: [Descargar Última ISO](https://github.com/\${{ github.repository }}/releases/download/latest/cminewarOS-live.iso)

*Compilado dinámicamente desde el núcleo cognitivo:* Versión v\$APP_VERSION (Compilación #\$BUILD_NUM) en fecha \$(date -u)" \
            --prerelease=false || echo "[⚠️] Falló la creación de la release 'latest', continuando..."
