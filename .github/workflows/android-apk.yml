name: Build Android APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Compile Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Web Application (React/Vite)
        run: |
          npm run build || echo "Vite build failed, continuing with fallback..."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Initialize & Sync Capacitor Android
        run: |
          # Guarantee that the build web directory exists so Capacitor doesn't crash on empty directories
          mkdir -p dist
          if [ ! -f "dist/index.html" ]; then
            echo "<html><head><title>CMineWar OS</title></head><body><div id='root'>CMineWar OS Running</div></body></html>" > dist/index.html
          fi

          # If the android folder does not exist, initialize and add the android platform
          if [ ! -d "android" ]; then
            echo "[+] No se encontró la carpeta 'android'. Inicializando plataforma..."
            npx cap add android
          else
            echo "[+] Carpeta 'android' ya existe. Actualizando configuración..."
          fi
          
          echo "[+] Sincronizando recursos y código web con Capacitor..."
          npx cap sync android

      - name: Repair & Regenerate Gradle Wrapper (Fix Corrupted Jar)
        run: |
          cd android
          echo "[+] Detectando y reparando posibles corrupciones de gradle-wrapper.jar..."
          # Borrar cualquier jar corrupto/incompleto para evitar conflictos
          rm -f gradle/wrapper/gradle-wrapper.jar
          
          # Intentar regenerarlo con el comando de sistema o descargar el oficial
          if command -v gradle >/dev/null 2>&1; then
            echo "[+] Usando gradle nativo del runner para regenerar el wrapper v8.14.3..."
            gradle wrapper --gradle-version 8.14.3 || {
              echo "[-] Falló gradle wrapper de sistema, procediendo a descarga directa..."
              curl -sSL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.14.3/gradle/wrapper/gradle-wrapper.jar
            }
          else
            echo "[+] Descargando binario limpio de gradle-wrapper.jar desde el repositorio de Gradle..."
            mkdir -p gradle/wrapper
            curl -sSL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.14.3/gradle/wrapper/gradle-wrapper.jar
          fi
          
          # Verificar integridad del jar descargado/generado
          if [ -s "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "[✓] ¡gradle-wrapper.jar restaurado con éxito y listo para compilar!"
          else
            echo "[!] Re-intentando descarga alternativa desde raw.githubusercontent.com..."
            curl -sSL -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Build Android APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          echo "[+] Ejecutando compilación del binario APK mediante Gradle..."
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CMineWar_OS_Mobile_Debug_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Build Android APK (Release Unsigned)
        run: |
          cd android
          echo "[+] Compilando versión Release (Sin firmar)..."
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CMineWar_OS_Mobile_Release_APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
          if-no-files-found: warn

